<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  body {
    background: #f4f6f8;
    min-height: 100vh;
    padding: 30px 15px;
  }
  .wrapper {
    max-width: 700px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 25px;
  }
  @media (max-width: 600px) {
    .wrapper { grid-template-columns: 1fr; }
  }

  .card {
    background: #fff;
    border-radius: 10px;
    padding: 22px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }
  .card h2 {
    margin-bottom: 16px;
    color: #333;
    font-size: 18px;
  }

  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 5px;
  }
  .input-group input, .input-group select {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }
  .input-group input:focus, .input-group select:focus {
    outline: none;
    border-color: #4facfe;
  }

  .payment-options {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .payment-options label {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 10px;
    text-align: center;
    font-size: 14px;
    cursor: pointer;
    color: #444;
  }
  .payment-options input { display: none; }
  .payment-options input:checked + span {
    color: #fff;
  }
  .payment-options label.selected {
    background: #4facfe;
    border-color: #4facfe;
    color: #fff;
  }

  button.confirm-btn {
    width: 100%;
    padding: 12px;
    background: #2ecc71;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 6px;
  }
  button.confirm-btn:hover { background: #27ae60; }

  .order-item {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #444;
    padding: 7px 0;
    border-bottom: 1px solid #eee;
  }
  .order-total {
    margin-top: 12px;
    font-weight: bold;
    text-align: right;
    color: #333;
  }

  #errorMsg {
    color: #e74c3c;
    font-size: 13px;
    margin-top: 8px;
    min-height: 16px;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 15px;
    color: #4facfe;
    text-decoration: none;
    font-size: 14px;
  }
</style>
</head>
<body>

<div style="max-width:700px; margin: 0 auto;">
  <a class="back-link" href="home.html">&larr; Back to Shop</a>
</div>

<div class="wrapper">

  <div class="card">
    <h2>Shipping Details</h2>
    <form id="checkoutForm">
      <div class="input-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" required>
      </div>
      <div class="input-group">
        <label for="address">Address</label>
        <input type="text" id="address" required>
      </div>
      <div class="input-group">
        <label for="governorate">Governorate</label>
        <input type="text" id="governorate" required>
      </div>
      <div class="input-group">
        <label for="country">Country</label>
        <input type="text" id="country" required>
      </div>

      <label style="display:block; font-size:13px; color:#555; margin-bottom:6px;">Payment Method</label>
      <div class="payment-options">
        <label id="cashLabel" onclick="selectPayment('cash')">
          <input type="radio" name="payment" value="cash" id="cash" checked>
          <span>Cash on Delivery</span>
        </label>
        <label id="visaLabel" onclick="selectPayment('visa')">
          <input type="radio" name="payment" value="visa" id="visa">
          <span>Visa</span>
        </label>
      </div>

      <button type="submit" class="confirm-btn">Confirm Order</button>
      <div id="errorMsg"></div>
    </form>
  </div>

  <div class="card">
    <h2>Order Summary</h2>
    <div id="orderItems"></div>
    <div class="order-total" id="orderTotal">Total: $0.00</div>
  </div>

</div>

<script>
  // ============================================
  // AUTH GUARD: block direct access without logging in
  // ============================================
  if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
  }
  // ============================================

  // Load cart saved from the home page
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");

  function renderOrderSummary() {
    const itemsContainer = document.getElementById("orderItems");
    itemsContainer.innerHTML = "";
    if (cart.length === 0) {
      itemsContainer.innerHTML = "<p style='color:#888; font-size:14px;'>Your cart is empty.</p>";
    } else {
      cart.forEach(item => {
        const row = document.createElement("div");
        row.className = "order-item";
        row.innerHTML = `<span>${item.name} x${item.qty}</span><span>$${(item.price * item.qty).toFixed(2)}</span>`;
        itemsContainer.appendChild(row);
      });
    }
    const total = cart.reduce((sum, item) => sum + item.qty * item.price, 0);
    document.getElementById("orderTotal").textContent = `Total: $${total.toFixed(2)}`;
  }

  function selectPayment(method) {
    document.getElementById(method).checked = true;
    document.getElementById("cashLabel").classList.toggle("selected", method === "cash");
    document.getElementById("visaLabel").classList.toggle("selected", method === "visa");
  }

  document.getElementById("checkoutForm").addEventListener("submit", function (e) {
    e.preventDefault();

    if (cart.length === 0) {
      document.getElementById("errorMsg").textContent = "Your cart is empty.";
      return;
    }

    const fullName = document.getElementById("fullName").value.trim();
    const address = document.getElementById("address").value.trim();
    const governorate = document.getElementById("governorate").value.trim();
    const country = document.getElementById("country").value.trim();
    const payment = document.querySelector('input[name="payment"]:checked').value;

    if (!fullName || !address || !governorate || !country) {
      document.getElementById("errorMsg").textContent = "Please fill in all fields.";
      return;
    }

    // In a real app, this data would be sent to a server here.
    const order = { fullName, address, governorate, country, payment, cart };
    console.log("Order placed:", order);

    alert(
      `Order confirmed!\n\nName: ${fullName}\nAddress: ${address}, ${governorate}, ${country}\nPayment: ${payment === "cash" ? "Cash on Delivery" : "Visa"}\n\nThank you for shopping!`
    );

    // clear the cart after a successful order
    localStorage.removeItem("cart");
    window.location.href = "home.html";
  });

  selectPayment("cash");
  renderOrderSummary();
</script>

</body>
</html>
