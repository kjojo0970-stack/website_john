<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
  }
  .login-box {
    background: #fff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 320px;
  }
  .login-box h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
  }
  .input-group {
    margin-bottom: 18px;
  }
  .input-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    color: #555;
  }
  .input-group input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }
  .input-group input:focus {
    outline: none;
    border-color: #4facfe;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #4facfe;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }
  button:hover {
    background: #0090e0;
  }
  #error-msg {
    color: #e74c3c;
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    min-height: 16px;
  }
</style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>
  <form id="loginForm">
    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" required>
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" required>
    </div>
    <button type="submit">Login</button>
    <div id="error-msg"></div>
  </form>
</div>

<script>
  // ============================================
  // ADD OR CHANGE ACCOUNTS HERE
  // Add as many accounts as you want, each with a username and password
  // ============================================
  const ACCOUNTS = [
    { username: "admin", password: "1234" },
    { username: "johnwebsite", password: "171220" },
    { username: "sara", password: "sara2024" }
  ];
  // ============================================

  const form = document.getElementById("loginForm");
  const errorMsg = document.getElementById("error-msg");

  form.addEventListener("submit", function (e) {
    e.preventDefault(); // stop page from refreshing

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    // check if any account in the list matches what was typed
    const match = ACCOUNTS.find(
      acc => acc.username === username && acc.password === password
    );

    if (match) {
      // correct login -> mark as logged in, then go to home page
      localStorage.setItem("loggedIn", "true");
      window.location.href = "home.html";
    } else {
      errorMsg.textContent = "Wrong username or password. Try again.";
    }
  });
</script>

</body>
</html>
